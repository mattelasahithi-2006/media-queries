<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
              display: flex;
         justify-content: center; /* Horizontally centers the button */

}

            transition: smooth 2s;

          transform:scale(1.2);
        }
