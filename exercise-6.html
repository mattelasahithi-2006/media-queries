<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 200px;
            height: 200px;
            background-color: powderblue;
            transition: smooth 1s;

            height: 250px;
        }

    <div class="card">
        this is a student_card
    </div>
