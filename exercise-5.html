<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
          display: flex;
         justify-content: center; /* Horizontally centers the button */
         align-items: center;     /* Vertically centers the button */
          min-height: 100vh;       /* Makes container 100% of the screen height */
}
        button{
            display:block;
            background-color: blue;
            width:100px;
            height: 40px;
            border-radius: 10px;
            transition: all 0.5s;
        }
        button:hover{
            background-color: green;
            scale: 1.1;
        }
    </style>
</head>
<body>
    <button>
        click me
    </button>
</body>
</html>
